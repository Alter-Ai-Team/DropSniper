name: dropsniper
description: Privacy-first local price tracker for project carts.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.2
  html: ^0.15.4
  workmanager: ^0.6.0
  flutter_local_notifications: ^19.2.0
  receive_sharing_intent: ^1.8.1

flutter:
  uses-material-design: true


dev_dependencies:
  flutter_test:
    sdk: flutter
