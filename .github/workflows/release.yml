name: Tagged Signed Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true


      - name: Ensure Flutter platform scaffolding
        run: flutter create --platforms=android,ios,windows .

      - name: Install dependencies
        run: flutter pub get

      - name: Normalize Android JVM target
        run: |
          echo "kotlin.jvm.target.validation.mode=warning" >> android/gradle.properties

      - name: Prepare Android signing files
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' && secrets.ANDROID_STORE_PASSWORD != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<PROP
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=app/upload-keystore.jks
          PROP

      - name: Build signed APK
        run: flutter build apk --release

      - name: Publish APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true

  windows-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop


      - name: Ensure Flutter platform scaffolding
        run: flutter create --platforms=android,ios,windows .

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows EXE bundle
        run: flutter build windows --release

      - name: Windows code-sign placeholder
        if: ${{ secrets.WINDOWS_CERT_BASE64 != '' && secrets.WINDOWS_CERT_PASSWORD != '' }}
        shell: pwsh
        run: |
          Write-Host "Decoding code-sign certificate"
          [IO.File]::WriteAllBytes('windows-signing.pfx', [Convert]::FromBase64String('${{ secrets.WINDOWS_CERT_BASE64 }}'))
          Write-Host "TODO: integrate signtool with your certificate subject/path."
          Write-Host "Placeholder step completed."

      - name: Archive Windows bundle
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath dropsniper-windows-release.zip

      - name: Publish Windows ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: dropsniper-windows-release.zip
          generate_release_notes: true
